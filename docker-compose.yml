services:
  app:
    build: .
    ports:
      - "${PORT_MAPPING}"
    env_file:
      - .env
    depends_on:
      - db
      - redis
  db:
    image: postgres:18
    container_name: db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: redis
  
volumes:
  pgdata: